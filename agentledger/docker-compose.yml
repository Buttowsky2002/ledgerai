# AgentLedger local development stack
#
#   docker compose up -d
#   curl -s http://localhost:8080/healthz
#
# ClickHouse HTTP is exposed on :8123 — point the gateway event sink at
# it directly for dev (events.type=http, url below), or run Redpanda in
# between for the production-shaped pipeline.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentledger
      POSTGRES_USER: agentledger
      POSTGRES_PASSWORD: dev_only_change_me
    ports: ["5432:5432"]
    volumes:
      - ./deploy/postgres:/docker-entrypoint-initdb.d:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentledger"]
      interval: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - ./deploy/clickhouse:/docker-entrypoint-initdb.d:ro
      - ./deploy/clickhouse-config/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro
      - ./deploy/clickhouse-config/users.xml:/etc/clickhouse-server/users.d/zz-default.xml:ro
      - ch_data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports: ["19092:19092"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  collector:
    build: ./services/collector
    environment:
      AGENTLEDGER_KAFKA_BROKERS: redpanda:9092
      AGENTLEDGER_KAFKA_TOPIC: events.raw
      AGENTLEDGER_EVENT_SCHEMA: /etc/agentledger/schemas/events/llm_call.schema.json
    ports: ["8090:8090"]
    volumes:
      - ./schemas:/etc/agentledger/schemas:ro
    depends_on:
      redpanda: { condition: service_started }

  ch-insert:
    build:
      context: ./services/workers
      args: { CMD: ch-insert }
    environment:
      AGENTLEDGER_KAFKA_BROKERS: redpanda:9092
      AGENTLEDGER_KAFKA_TOPIC: events.raw
      AGENTLEDGER_KAFKA_DLQ_TOPIC: events.dlq
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
    ports: ["8091:8091"]
    depends_on:
      clickhouse: { condition: service_healthy }
      redpanda: { condition: service_started }

  reconcile:
    build:
      context: ./services/workers
      args: { CMD: reconcile }
    environment:
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_RECONCILE_THRESHOLD: "0.02"
      AGENTLEDGER_RECONCILE_INTERVAL_SEC: "86400"
    ports: ["8093:8093"]
    depends_on:
      clickhouse: { condition: service_healthy }

  connector-sync:
    build: ./services/connectors
    environment:
      AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_SYNC_INTERVAL_SEC: "3600"
    ports: ["8092:8092"]
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

  gateway:
    build: ./services/gateway
    environment:
      AGENTLEDGER_CONFIG: /etc/agentledger/config.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Uncomment to enable Redis-backed budget store:
      # AGENTLEDGER_REDIS_PASSWORD: ""
      # Uncomment to enable Postgres config hot-reload (virtual keys + DLP policies,
      # refreshed every 30s; serves last-known-good on outage). Unset = static file config.
      # AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
    ports: ["8080:8080"]
    volumes:
      - ./services/gateway/config.example.json:/etc/agentledger/config.json:ro
      - ./pricing:/etc/agentledger/pricing:ro
    depends_on:
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }

  # Dev-only one-shot: grants the least-privilege agentledger_api role (created
  # NOLOGIN in 002_rls.sql) a login + throwaway dev password, so the API connects
  # as a NON-superuser and is therefore subject to RLS. Runs after Postgres is
  # healthy and exits; prod grants the login via a secret manager instead.
  pg-dev-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: dev_only_change_me
    volumes:
      - ./deploy/postgres-dev/dev_api_role.sql:/dev_api_role.sql:ro
    # Wait for real TCP availability before applying: Postgres' healthcheck can
    # pass during first-init (socket-only temp server) before it listens on TCP.
    entrypoint:
      ["sh", "-c", "until psql -h postgres -U agentledger -d agentledger -c 'SELECT 1' >/dev/null 2>&1; do echo 'waiting for postgres tcp'; sleep 1; done; psql -h postgres -U agentledger -d agentledger -v ON_ERROR_STOP=1 -f /dev_api_role.sql"]
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: ./services/api
    environment:
      # Connects as the least-privilege agentledger_api role (NON-superuser, so
      # it is subject to RLS). The bootstrap `agentledger` user would bypass RLS.
      AGENTLEDGER_PG_DSN: postgres://agentledger_api:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_API_ADDR: ":8094"
      # Session-JWT signing secret (dev placeholder; prod injects via secret manager).
      AGENTLEDGER_JWT_SECRET: dev_only_change_me_jwt
      # DEV ONLY: trust x-tenant-id header (dev admin principal) alongside real JWT auth.
      AGENTLEDGER_DEV_TRUST_HEADER: "true"
      # OIDC providers are configured by env-var NAMES (rule 1); unset → provider
      # unavailable. Uncomment + supply real values to enable live SSO:
      # AGENTLEDGER_OIDC_REDIRECT_BASE: http://localhost:8094
      # AGENTLEDGER_OIDC_GOOGLE_CLIENT_ID: ${AGENTLEDGER_OIDC_GOOGLE_CLIENT_ID:-}
      # AGENTLEDGER_OIDC_GOOGLE_CLIENT_SECRET: ${AGENTLEDGER_OIDC_GOOGLE_CLIENT_SECRET:-}
      # AGENTLEDGER_OIDC_MICROSOFT_CLIENT_ID: ${AGENTLEDGER_OIDC_MICROSOFT_CLIENT_ID:-}
      # AGENTLEDGER_OIDC_MICROSOFT_CLIENT_SECRET: ${AGENTLEDGER_OIDC_MICROSOFT_CLIENT_SECRET:-}
    ports: ["8094:8094"]
    depends_on:
      postgres: { condition: service_healthy }
      pg-dev-init: { condition: service_completed_successfully }
      clickhouse: { condition: service_healthy }

volumes:
  pg_data:
  ch_data:
