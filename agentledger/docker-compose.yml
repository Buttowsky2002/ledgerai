# BadgerIQ local development stack
#
#   docker compose up -d
#   curl -s http://localhost:8080/healthz
#
# ClickHouse HTTP is exposed on :8123 — point the gateway event sink at
# it directly for dev (events.type=http, url below), or run Redpanda in
# between for the production-shaped pipeline.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentledger
      POSTGRES_USER: agentledger
      POSTGRES_PASSWORD: dev_only_change_me
    ports: ["5432:5432"]
    volumes:
      - ./deploy/postgres:/docker-entrypoint-initdb.d:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentledger"]
      interval: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - ./deploy/clickhouse:/docker-entrypoint-initdb.d:ro
      - ./deploy/clickhouse-config/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro
      - ./deploy/clickhouse-config/users.xml:/etc/clickhouse-server/users.d/zz-default.xml:ro
      - ch_data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports: ["19092:19092"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  collector:
    build: ./services/collector
    environment:
      AGENTLEDGER_KAFKA_BROKERS: redpanda:9092
      AGENTLEDGER_KAFKA_TOPIC: events.raw
      AGENTLEDGER_EVENT_SCHEMA: /etc/agentledger/schemas/events/llm_call.schema.json
    ports: ["8090:8090"]
    volumes:
      - ./schemas:/etc/agentledger/schemas:ro
    depends_on:
      redpanda: { condition: service_started }

  ch-insert:
    build:
      context: ./services/workers
      args: { CMD: ch-insert }
    environment:
      AGENTLEDGER_KAFKA_BROKERS: redpanda:9092
      AGENTLEDGER_KAFKA_TOPIC: events.raw
      AGENTLEDGER_KAFKA_DLQ_TOPIC: events.dlq
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
    ports: ["8091:8091"]
    depends_on:
      clickhouse: { condition: service_healthy }
      redpanda: { condition: service_started }

  reconcile:
    build:
      context: ./services/workers
      args: { CMD: reconcile }
    environment:
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_RECONCILE_THRESHOLD: "0.02"
      AGENTLEDGER_RECONCILE_INTERVAL_SEC: "86400"
    ports: ["8093:8093"]
    depends_on:
      clickhouse: { condition: service_healthy }

  # Outcome→run attribution (P3). V2 cutover: stamps outcomes + attribution_edges;
  # V1 skipped when ATTRIBUTION_ENGINE_V2_CUTOVER=true.
  attribution:
    build:
      context: ./services/workers
      args: { CMD: attribution }
    environment:
      AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_WORKER_ADDR: ":8096"
      AGENTLEDGER_ATTR_INTERVAL_SEC: "300"
      ATTRIBUTION_ENGINE_V2: "true"
      ATTRIBUTION_ENGINE_V2_CUTOVER: "true"
      BADGERIQ_ATTR_ALLOW_TRIGGER: "true"
    ports: ["8096:8096"]
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

  # Proposes pricing/pricebook.candidate.json + pricebook.diff.json from the LiteLLM
  # list-price feed for human PR review. Never mutates the live price book at runtime.
  pricesync:
    build:
      context: ./services/workers
      args: { CMD: pricesync }
    working_dir: /w
    volumes:
      - .:/w
    environment:
      BADGERIQ_PRICESYNC_LIVE: pricing/pricebook.json
      BADGERIQ_PRICESYNC_OUT: pricing/pricebook.candidate.json
      BADGERIQ_PRICESYNC_DIFF: pricing/pricebook.diff.json
      BADGERIQ_PRICESYNC_INTERVAL_SEC: "86400"
      BADGERIQ_WORKER_ADDR: ":8098"
    ports: ["8098:8098"]

  # Agent-Native Risk Engine (Phase 5): observed tool usage vs the deny-by-default
  # allowlist → governed risk_events + agent_risk → risk-adjusted ROI.
  risk-engine:
    build:
      context: ./services/workers
      args: { CMD: risk-engine }
    environment:
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_RISK_INTERVAL_SEC: "3600"
      AGENTLEDGER_RISK_SPIKE_MIN: "5"
    ports: ["8099:8099"]
    depends_on:
      clickhouse: { condition: service_healthy }

  # Semantic risk-enrichment tier (Phase 6, deferred from P5): LLM classifies
  # per-run tool-call sequences for injection / data-egress / anomalous patterns
  # → semantic_* risk_events. Opt-in and async (never inline): serves health only
  # unless AGENTLEDGER_RISK_ENRICH_ENABLED=true AND ANTHROPIC_API_KEY is set.
  risk-enrichment:
    build:
      context: ./services/workers
      args: { CMD: risk-enrichment }
    environment:
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_RISK_ENRICH_ENABLED: "${AGENTLEDGER_RISK_ENRICH_ENABLED:-false}"
      AGENTLEDGER_RISK_ENRICH_INTERVAL_SEC: "3600"
      AGENTLEDGER_RISK_ENRICH_MIN_CONFIDENCE: "0.5"
      AGENTLEDGER_RISK_ENRICH_MODEL: "${AGENTLEDGER_RISK_ENRICH_MODEL:-claude-opus-4-8}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}" # env-var name only; never commit a key (rule 1)
    ports: ["8100:8100"]
    depends_on:
      clickhouse: { condition: service_healthy }

  # Slack alerting (Phase 6 F2): polls budgets (Postgres) + spend (ClickHouse
  # spend_daily / spend_hourly_by_key) for alert_pcts crossings, and risk_events
  # severity=high, then posts to a Slack webhook. Dedupe is in-memory per process
  # (ADR-038). Reads cross-tenant (no per-request RLS), same convention as the
  # gateway config reads. Webhook URL is an env-var NAME only (rule 1); unset =
  # alerting disabled (worker runs as a no-op, serving health only).
  slack-alerter:
    build:
      context: ./services/workers
      args: { CMD: slack-alerter }
    environment:
      AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_SLACK_ALERT_INTERVAL_SEC: "300"
      AGENTLEDGER_SLACK_WEBHOOK_URL: "${AGENTLEDGER_SLACK_WEBHOOK_URL:-}" # env-var name only; never commit a webhook (rule 1)
    ports: ["8101:8101"]
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

  connector-sync:
    build:
      context: ./services/connectors
      args: { CMD: connector-sync }
    environment:
      AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_SYNC_INTERVAL_SEC: "3600"
    ports: ["8092:8092"]
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

  # Outcome connectors (GitHub/Jira/Zendesk) → ClickHouse outcomes (Phase 4).
  outcome-sync:
    build:
      context: ./services/connectors
      args: { CMD: outcome-sync }
    environment:
      AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_OUTCOME_SYNC_INTERVAL_SEC: "3600"
      # GitHub PAT supplied at deploy time (env-var name referenced in connectors.config):
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports: ["8095:8095"]
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }

  # LiteLLM spend-log adapter (gateway-agnostic ingestion, Pivot P1).
  # Point LiteLLM's logging callback at http://litellm-adapter:8097/ingest/litellm.
  litellm-adapter:
    build:
      context: ./services/ingest/adapters
      args: { CMD: litellm }
    environment:
      AGENTLEDGER_COLLECTOR_URL: http://collector:8090/v1/events
      # Per-deployment default tenant (override per-record via metadata key).
      AGENTLEDGER_ADAPTER_TENANT: ${AGENTLEDGER_ADAPTER_TENANT:-}
    ports: ["8097:8097"]
    depends_on:
      collector: { condition: service_started }

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      AGENTLEDGER_CONFIG: /etc/agentledger/config.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Uncomment to enable Redis-backed budget store:
      # AGENTLEDGER_REDIS_PASSWORD: ""
      # Uncomment to enable Postgres config hot-reload (virtual keys + DLP policies
      # + per-agent tool/MCP allowlist for inline tool governance, ADR-032;
      # refreshed every 30s; serves last-known-good on outage). Unset = static file config.
      # AGENTLEDGER_PG_DSN: postgres://agentledger:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
    ports: ["8080:8080"]
    volumes:
      - ./services/gateway/config.example.json:/etc/agentledger/config.json:ro
      - ./pricing:/etc/agentledger/pricing:ro
    depends_on:
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }

  # Dev-only one-shot: grants the least-privilege agentledger_api role (created
  # NOLOGIN in 002_rls.sql) a login + throwaway dev password, so the API connects
  # as a NON-superuser and is therefore subject to RLS. Runs after Postgres is
  # healthy and exits; prod grants the login via a secret manager instead.
  pg-dev-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: dev_only_change_me
    volumes:
      - ./deploy/postgres-dev/dev_api_role.sql:/dev_api_role.sql:ro
    # Wait for real TCP availability before applying: Postgres' healthcheck can
    # pass during first-init (socket-only temp server) before it listens on TCP.
    entrypoint:
      ["sh", "-c", "until psql -h postgres -U agentledger -d agentledger -c 'SELECT 1' >/dev/null 2>&1; do echo 'waiting for postgres tcp'; sleep 1; done; psql -h postgres -U agentledger -d agentledger -v ON_ERROR_STOP=1 -f /dev_api_role.sql"]
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      # Connects as the least-privilege agentledger_api role (NON-superuser, so
      # it is subject to RLS). The bootstrap `agentledger` user would bypass RLS.
      AGENTLEDGER_PG_DSN: postgres://agentledger_api:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      BADGERIQ_PG_DSN: postgres://agentledger_api:dev_only_change_me@postgres:5432/agentledger?sslmode=disable
      AGENTLEDGER_CLICKHOUSE_URL: http://clickhouse:8123
      AGENTLEDGER_CLICKHOUSE_DB: agentledger
      AGENTLEDGER_API_ADDR: ":8094"
      # This is the DEV/demo stack. The image defaults to NODE_ENV=production; override
      # it here so dev auth is permitted. (In production the API refuses to start if a
      # dev trust header is enabled — see assertDevTrustHeaderNotInProduction.)
      NODE_ENV: development
      # Session-JWT signing secret (dev placeholder; prod injects via secret manager).
      AGENTLEDGER_JWT_SECRET: dev_only_change_me_jwt
      # DEV ONLY: trust x-tenant-id header (dev admin principal) alongside real JWT auth.
      AGENTLEDGER_DEV_TRUST_HEADER: "true"
      BADGERIQ_DESIGN_PARTNER_ONBOARD_ENABLED: "true"
      BADGERIQ_ATTRIBUTION_WORKER_URL: http://attribution:8096
      # OIDC providers are configured by env-var NAMES (rule 1); unset → provider
      # unavailable. Uncomment + supply real values to enable live SSO:
      # AGENTLEDGER_OIDC_REDIRECT_BASE: http://localhost:8094
      # AGENTLEDGER_OIDC_GOOGLE_CLIENT_ID: ${AGENTLEDGER_OIDC_GOOGLE_CLIENT_ID:-}
      # AGENTLEDGER_OIDC_GOOGLE_CLIENT_SECRET: ${AGENTLEDGER_OIDC_GOOGLE_CLIENT_SECRET:-}
      # AGENTLEDGER_OIDC_MICROSOFT_CLIENT_ID: ${AGENTLEDGER_OIDC_MICROSOFT_CLIENT_ID:-}
      # AGENTLEDGER_OIDC_MICROSOFT_CLIENT_SECRET: ${AGENTLEDGER_OIDC_MICROSOFT_CLIENT_SECRET:-}
    ports: ["8094:8094"]
    depends_on:
      postgres: { condition: service_healthy }
      pg-dev-init: { condition: service_completed_successfully }
      clickhouse: { condition: service_healthy }

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        BADGERIQ_API_URL: http://api:8094
    environment:
      BADGERIQ_API_URL: http://api:8094
      # Your connectors/imports live on this tenant today (dev header auth).
      BADGERIQ_DEV_TENANT_ID: "${BADGERIQ_DEV_TENANT_ID:-00000000-0000-4000-8000-000000000001}"
      # false = no demo banner; use make reset-demo to drop synthetic analytics only.
      BADGERIQ_DEMO_MODE: "${BADGERIQ_DEMO_MODE:-false}"
      # Docker standalone image runs NODE_ENV=production — keep BFF auth for local stacks.
      BADGERIQ_DEV_TRUST_TENANT: "${BADGERIQ_DEV_TRUST_TENANT:-true}"
      NODE_ENV: development
    ports: ["3000:3000"]
    depends_on:
      api: { condition: service_started }

volumes:
  pg_data:
  ch_data:
