# EXAMPLE ONLY — do NOT commit a filled-in copy of this file (CLAUDE.md rule 1).
# The chart contains no secret material; it references the Secret you name in
# `secrets.existingSecret`. Create that Secret out-of-band — ideally via your
# secret manager (External Secrets Operator, Vault, cloud KMS-backed secrets),
# not by applying a static manifest.
#
# The placeholders below are NOT realistic-format values on purpose. Replace
# each REPLACE_ME with the real value at deploy time, e.g.:
#
#   kubectl -n <ns> create secret generic agentledger-secrets \
#     --from-literal=BADGERIQ_PG_DSN='postgres://USER:PASS@HOST:5432/agentledger?sslmode=require' \
#     --from-literal=BADGERIQ_JWT_SECRET='...' \
#     --from-literal=OPENAI_API_KEY='...' \
#     --from-literal=ANTHROPIC_API_KEY='...' \
#     --from-literal=BADGERIQ_SLACK_WEBHOOK_URL='...' \
#     --from-literal=GITHUB_TOKEN='...' \
#     --from-literal=BADGERIQ_REDIS_PASSWORD='...'
#
# then: helm upgrade --install ... --set secrets.existingSecret=agentledger-secrets
apiVersion: v1
kind: Secret
metadata:
  name: agentledger-secrets
type: Opaque
stringData:
  # Control-plane Postgres DSN. The API connects as a NON-superuser role so RLS
  # applies; cross-tenant readers (gateway config, slack-alerter) use a role that
  # bypasses RLS. Use sslmode=require in production.
  BADGERIQ_PG_DSN: REPLACE_ME
  BADGERIQ_JWT_SECRET: REPLACE_ME
  OPENAI_API_KEY: REPLACE_ME
  ANTHROPIC_API_KEY: REPLACE_ME
  BADGERIQ_SLACK_WEBHOOK_URL: REPLACE_ME
  GITHUB_TOKEN: REPLACE_ME
  BADGERIQ_REDIS_PASSWORD: REPLACE_ME
