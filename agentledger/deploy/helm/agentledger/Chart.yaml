apiVersion: v2
name: agentledger
description: |
  BadgerIQ — the agent FinOps & risk control plane. This chart deploys the
  BadgerIQ application workloads (gateway, control-plane API, ingest collector,
  async workers, connectors, adapter). Stateful infrastructure (PostgreSQL,
  ClickHouse, Redpanda/Kafka, Redis) is NOT bundled — point the chart at managed,
  operator-provisioned services (see deploy/terraform). Cloud-agnostic by design.
type: application
# Chart version — bump on chart changes (SemVer).
version: 0.1.0
# appVersion tracks the BadgerIQ application release; image tags default to it.
appVersion: "0.1.0"
keywords:
  - finops
  - llm
  - observability
  - ai-governance
home: https://github.com/agentledger/agentledger
maintainers:
  - name: BadgerIQ Platform team
