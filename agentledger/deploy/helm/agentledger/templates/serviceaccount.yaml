{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agentledger.serviceAccountName" . }}
  labels:
    {{- include "agentledger.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# No automatic API-token mount — BadgerIQ workloads never call the K8s API.
automountServiceAccountToken: false
{{- end }}
