version: "2"

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

    # Security (handles provider credentials + untrusted API responses)
    - gosec
    - bodyclose
    - noctx
    - sqlclosecheck

    # Style / maintainability
    - revive
    - misspell

  settings:
    gosec:
      excludes: ["G104"] # unhandled errors already covered by errcheck
      severity: medium
      confidence: medium

    revive:
      rules:
        - name: exported
          disabled: false
        - name: error-return
          disabled: false
        - name: error-strings
          disabled: false
        - name: var-naming
          disabled: false

  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [gosec]

# gofmt is a formatter in golangci-lint v2, not a linter.
formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
