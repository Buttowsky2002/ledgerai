version: "2"

linters:
  default: none
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

    # Security (handles provider credentials + untrusted API responses)
    - gosec
    - bodyclose
    - noctx
    - sqlclosecheck

    # Style / maintainability
    - revive
    - gofmt
    - misspell

linters-settings:
  gosec:
    excludes: ["G104"] # unhandled errors already covered by errcheck
    severity: medium
    confidence: medium

  errcheck:
    check-type-assertions: true
    check-blank: true

  revive:
    rules:
      - name: exported
        disabled: false
      - name: error-return
        disabled: false
      - name: error-strings
        disabled: false
      - name: var-naming
        disabled: false

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [gosec]
  max-issues-per-linter: 0
  max-same-issues: 0
