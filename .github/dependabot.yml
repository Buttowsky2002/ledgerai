    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
