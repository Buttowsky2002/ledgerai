name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write   # for OIDC / cosign keyless signing

jobs:
  build:
    name: "Build ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            context: agentledger
            dockerfile: agentledger/services/gateway/Dockerfile
            build_args: ""
          - name: api
            context: agentledger
            dockerfile: agentledger/services/api/Dockerfile
            build_args: ""
          - name: dashboard
            context: agentledger
            dockerfile: agentledger/apps/dashboard/Dockerfile
            build_args: ""
          - name: collector
            context: agentledger/services/collector
            dockerfile: agentledger/services/collector/Dockerfile
            build_args: ""
          - name: ch-insert
            context: agentledger/services/workers
            dockerfile: agentledger/services/workers/Dockerfile
            build_args: "CMD=ch-insert"
          - name: reconcile
            context: agentledger/services/workers
            dockerfile: agentledger/services/workers/Dockerfile
            build_args: "CMD=reconcile"
          - name: attribution
            context: agentledger/services/workers
            dockerfile: agentledger/services/workers/Dockerfile
            build_args: "CMD=attribution"
          - name: risk-engine
            context: agentledger/services/workers
            dockerfile: agentledger/services/workers/Dockerfile
            build_args: "CMD=risk-engine"
          - name: connector-sync
            context: agentledger/services/connectors
            dockerfile: agentledger/services/connectors/Dockerfile
            build_args: "CMD=connector-sync"
          - name: outcome-sync
            context: agentledger/services/connectors
            dockerfile: agentledger/services/connectors/Dockerfile
            build_args: "CMD=outcome-sync"
          - name: litellm-adapter
            context: agentledger/services/ingest/adapters
            dockerfile: agentledger/services/ingest/adapters/Dockerfile
            build_args: "CMD=litellm"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ledgerai-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      # OCI/GHCR refs must be lowercase. github.repository_owner preserves the
      # owner's original casing (Buttowsky2002), which Syft rejects as an
      # unparseable reference. docker/metadata-action already lowercases the
      # tags it pushes, so the image exists only under the lowercase path.
      # Also scan by digest (not github.ref_name): semver tags strip the leading
      # "v" (v0.1.1-pilot → 0.1.1-pilot), so :${{ github.ref_name }} never matches.
      - name: Compute lowercase image ref
        id: image
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REF="ghcr.io/${OWNER_LC}/ledgerai-${{ matrix.name }}@${{ steps.build.outputs.digest }}"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved image ref: ${REF}"

      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      # Invoke Syft directly (not via sbom-action's opaque wrapper) so -v stderr
      # is visible in the job log on failure. Pull via the already-authenticated
      # Docker daemon first (with retries for brief GHCR propagation lag), then
      # scan the local image.
      - name: Generate SBOM
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          SBOM_FILE: sbom-${{ matrix.name }}-${{ github.ref_name }}.spdx.json
        run: |
          set -euo pipefail
          echo "Pulling ${IMAGE_REF}"
          for attempt in 1 2 3 4 5; do
            if docker pull "${IMAGE_REF}" 2>&1; then
              echo "Pull succeeded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::docker pull failed after 5 attempts for ${IMAGE_REF}"
              exit 1
            fi
            echo "::warning::docker pull attempt ${attempt}/5 failed; retrying in 5s..."
            sleep 5
          done

          echo "Scanning ${IMAGE_REF}"
          if ! syft scan "${IMAGE_REF}" -o "spdx-json=${SBOM_FILE}" -v 2>&1; then
            echo "::error::Syft failed for ${IMAGE_REF}"
            exit 1
          fi
          echo "SBOM written to ${SBOM_FILE}"
          ls -la "${SBOM_FILE}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        run: |
          cosign sign --yes "${{ steps.image.outputs.ref }}"

      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate "sbom-${{ matrix.name }}-${{ github.ref_name }}.spdx.json" \
            --type spdxjson \
            "${{ steps.image.outputs.ref }}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}-${{ github.ref_name }}.spdx.json

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.spdx.json"
          generate_release_notes: true
