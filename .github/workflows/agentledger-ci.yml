name: AgentLedger CI

on:
  pull_request:
    paths:
      - "agentledger/**"
      - ".github/workflows/agentledger-ci.yml"
  push:
    branches: [main]
    paths:
      - "agentledger/**"
      - ".github/workflows/agentledger-ci.yml"

concurrency:
  group: agentledger-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # CodeQL SARIF upload

# ---------------------------------------------------------------------------
# gitleaks runs first and gates everything else — no wasted compute when a
# secret is in the diff. Coverage spans every agentledger/ module:
#   Go    — collector, connectors, gateway, workers
#   TS    — shared-types, api, dashboard, sdk-typescript
#   + a compose-backed API e2e (RLS/RBAC/audit/analytics/ROI) and CodeQL.
#
# golangci-lint runs per module as a BLOCKING gate (errcheck, gosec, staticcheck,
# revive, bodyclose, noctx, sqlclosecheck, ineffassign, unused, govet, misspell;
# gofmt via the formatters block). It rides on the already-required "Go — <module>"
# checks, so no ruleset change is needed.
# ---------------------------------------------------------------------------
jobs:

  # ── 1. Secret scanning ─────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: agentledger/.gitleaks.toml

  # ── 2. Go — vet, test (race), govulncheck (per module) ─────────────────────
  go:
    name: Go — ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: gitleaks
    strategy:
      fail-fast: false
      matrix:
        # ingest/adapters is stdlib-only (no go.sum), so the cache key below
        # points at go.mod, which every module has.
        module: [collector, connectors, gateway, workers, ingest/adapters]
    defaults:
      run:
        working-directory: agentledger/services/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentledger/services/${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: agentledger/services/${{ matrix.module }}/go.mod

      - name: Ensure go.mod/go.sum are tidy
        run: |
          go mod tidy
          if [ -n "$(git status --short -- go.mod go.sum)" ]; then
            echo "::error::go.mod/go.sum changed after 'go mod tidy' in ${{ matrix.module }}. Run 'go mod tidy' and commit."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      # Blocking. Runs after the build/test so the module cache is warm (golangci
      # needs compiled deps for type info). Pinned to the version verified locally.
      - name: golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.1.6
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      # Blocking. GOTOOLCHAIN pins the build to a current Go so the stdlib CVEs
      # (fixed only in Go newer than the go.mod `go 1.22` language version) are
      # resolved. Scoped to this step only, so golangci-lint above still sees the
      # go 1.22 target (it refuses to run against a higher targeted version).
      # govulncheck is pinned for determinism; its vuln DB is fetched at runtime.
      - name: govulncheck
        env:
          GOTOOLCHAIN: go1.26.4
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  # ── 3. TypeScript — shared-types (build) ───────────────────────────────────
  node-shared-types:
    name: TS — shared-types
    runs-on: ubuntu-latest
    needs: gitleaks
    defaults:
      run:
        working-directory: agentledger/packages/shared-types
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentledger/packages/shared-types/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── 4. TypeScript — control-plane API ──────────────────────────────────────
  node-api:
    name: TS — api (lint, build, test)
    runs-on: ubuntu-latest
    needs: gitleaks
    defaults:
      run:
        working-directory: agentledger/services/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentledger/services/api/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run build
      - run: npm test
      # Advisory only: pre-existing transitive advisories (NestJS deps). Flip to
      # blocking after a dependency-cleanup pass. Dependabot tracks upgrades.
      - name: Dependency audit
        continue-on-error: true
        run: npm audit --audit-level=high

  # ── 5. TypeScript — dashboard (needs shared-types built: file: dependency) ──
  node-dashboard:
    name: TS — dashboard (lint, build)
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentledger/apps/dashboard/package-lock.json
      - name: Build shared-types (workspace dependency)
        working-directory: agentledger/packages/shared-types
        run: npm ci && npm run build
      - name: Lint + build dashboard
        working-directory: agentledger/apps/dashboard
        run: |
          npm ci
          npm run lint
          npm run build
      # Advisory only (see node-api). Next.js transitive advisories need a major bump.
      - name: Dependency audit
        continue-on-error: true
        working-directory: agentledger/apps/dashboard
        run: npm audit --audit-level=high

  # ── 6. TypeScript — SDK ────────────────────────────────────────────────────
  node-sdk:
    name: TS — sdk-typescript (lint, test, build)
    runs-on: ubuntu-latest
    needs: gitleaks
    defaults:
      run:
        working-directory: agentledger/packages/sdk-typescript
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentledger/packages/sdk-typescript/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Advisory only (see node-api); the SDK ships zero runtime deps.
      - name: Dependency audit
        continue-on-error: true
        run: npm audit --audit-level=high

  # ── 7. API e2e — tenant isolation, RBAC, audit, analytics, ROI ─────────────
  # Brings up Postgres (+ dev role + migrations) and ClickHouse via compose,
  # then runs the supertest e2e suite (41 tests).
  api-e2e:
    name: API e2e (Postgres + ClickHouse)
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentledger/services/api/package-lock.json
      - name: Start infra
        working-directory: agentledger
        run: |
          docker compose up -d postgres pg-dev-init clickhouse
          # --wait only on the long-running services; pg-dev-init is a one-shot
          # that exits 0, which `docker compose --wait` would treat as a failure.
          docker compose up -d --wait --no-recreate postgres clickhouse
      - name: Run e2e
        working-directory: agentledger/services/api
        run: |
          npm ci
          npm run prisma:generate
          npm run test:e2e
      - name: Dump compose logs on failure
        if: failure()
        working-directory: agentledger
        run: docker compose logs --no-color | tail -200

  # ── 8. SAST — CodeQL (Go) ──────────────────────────────────────────────────
  codeql-go:
    name: SAST (CodeQL — Go)
    runs-on: ubuntu-latest
    needs: gitleaks
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: autobuild
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  # ── 9. SAST — CodeQL (TypeScript/JavaScript) ───────────────────────────────
  codeql-ts:
    name: SAST (CodeQL — TS/JS)
    runs-on: ubuntu-latest
    needs: gitleaks
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── 10. Event schema validation ────────────────────────────────────────────
  schema:
    name: Event schema validation
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate llm_call.schema.json is well-formed
        run: node -e "JSON.parse(require('fs').readFileSync('agentledger/schemas/events/llm_call.schema.json','utf8'))"
      - name: Validate example fixtures (if any exist)
        run: |
          EXAMPLES=$(find agentledger/schemas/events/examples -name '*.json' 2>/dev/null || true)
          if [ -n "$EXAMPLES" ]; then
            # llm_call.schema.json is JSON Schema draft 2020-12, so ajv-cli must
            # run with --spec=draft2020 (default is draft-07) and load ajv-formats
            # for the "date-time" format used by gen_ai timestamps.
            npx --yes --package=ajv-cli@5 --package=ajv-formats \
              ajv validate --spec=draft2020 -c ajv-formats \
              -s agentledger/schemas/events/llm_call.schema.json \
              -d "agentledger/schemas/events/examples/*.json"
          else
            echo "No example fixtures yet — skipping AJV validation."
          fi
