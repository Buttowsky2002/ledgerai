name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # for CodeQL SARIF upload

jobs:
  # ── Secret scanning ────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Go services ────────────────────────────────────────────────────
  go:
    name: Go — lint, test, vuln
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'services/') ||
      contains(github.event.pull_request.changed_files, 'api/go') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── TypeScript API ─────────────────────────────────────────────────
  typescript-api:
    name: TypeScript API — lint, test
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'api/') ||
      github.event_name == 'push'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Dependency audit
        run: npm audit --audit-level=high

  # ── Next.js dashboard ──────────────────────────────────────────────
  frontend:
    name: Next.js — lint, test, build
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'apps/dashboard/') ||
      github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Dependency audit
        run: npm audit --audit-level=high

  # ── Python workers ─────────────────────────────────────────────────
  python:
    name: Python — lint, test, audit
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'workers/') ||
      github.event_name == 'push'
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest --tb=short
      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit

  # ── SAST (CodeQL) ──────────────────────────────────────────────────
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [go, javascript-typescript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ── Schema validation ──────────────────────────────────────────────
  schema:
    name: Event schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx ajv-cli validate -s schemas/events/llm_call.schema.json -d schemas/events/examples/*.json
